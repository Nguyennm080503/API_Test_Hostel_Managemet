$kind: http-request
description: >-
  ## Change Account Status


  Updates the status of a specific account identified by its ID.


  ---


  ### HTTP Method & URL


  ```

  PATCH {{base_url}}/api/accounts/{{account_change_id}}/status

   ```

  ---


  ### Authentication


  This endpoint requires a valid Bearer token. Include the token in the
  `Authorization` header:


  ```

  Authorization: Bearer {{user_token}}

   ```

  Requests without a valid token will receive a `401 Unauthorized` response.
  Requests from users without sufficient permissions will receive a `403
  Forbidden` response.


  ---


  ### Path Variables


  | Variable | Description |

  | --- | --- |

  | `account_change_id` | The ID of the account whose status is to be changed.
  Set via pre-request script (default: `1`). |


  ---


  ### Request Body


  Provide the new status value as a request body parameter.


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `status` | string | Yes | The new status to assign to the account. |


  > Missing or invalid `status` values will result in an error response. 
    

  ---


  ### Responses


  | Status Code | Description |

  | --- | --- |

  | `200 OK` | Status changed successfully. Response includes a success message
  ("thành công"). |

  | `400 Bad Request` | Invalid request — possible causes: invalid `accountId`
  format, account not found, missing/invalid `status` param, or other change
  failure. |

  | `401 Unauthorized` | No token provided or token is invalid. |

  | `403 Forbidden` | Authenticated user does not have permission to perform
  this action. |

  | `500 Internal Server Error` | An unexpected server error occurred. |


  ---


  ### Pre-request Script


  The pre-request script automatically sets the `account_change_id` environment
  variable to `1` before the request is sent:


  ``` javascript

  pm.environment.set("account_change_id", 1);

   ```

  ---


  ### Notes


  - Response time should be under **2000ms**.
      
  - Ensure the `base_url` and `user_token` global variables are configured in
  your environment before running this request.
url: "{{base_url}}/api/accounts/{{account_change_id}}/status"
method: PATCH
queryParams:
  - key: status
    value: null
    disabled: true
auth:
  type: bearer
  credentials:
    token: "{{user_token}}"
scripts:
  - type: afterResponse
    code: "// 1. Check change status successfully\r

      pm.test(\"Change status successfully\", function () {\r

      \    pm.response.to.have.status(200);\r

      \    pm.expect(pm.response.text()).to.include(\"thành công\");\r

      });\r

      \r

      // 2. Response time < 2000ms\r

      pm.test(\"Response time is less than 2000ms\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(2000);\r

      });\r

      \r

      \r

      // 3. Check user is forbidden when not authorized.\r

      pm.test(\"User is forbidden\", function () {\r

      \    try{\r

      \        pm.response.to.have.status(403);\r

      \    }catch{\r

      \        throw new Error(\"User is not forbidden\");\r

      \    }\r

      });\r

      \r

      \r

      // 4. Check unautorized response when no token is provided.\r

      pm.test(\"Unauthorized when no token\", function () {\r

      \    try{\r

      \        pm.response.to.have.status(401);\r

      \    }catch{\r

      \        throw new Error(\"User has token\");\r

      \    }\r

      });\r

      \r

      // 5. Check missing status\r

      pm.test(\"Missing status param\", function () {\r

      \    pm.expect(pm.response.text()).to.include(\"missing\");\r

      });\r

      \r

      // 6. Check invalid status\r

      pm.test(\"Invalid status value\", function () {\r

      \    pm.expect(pm.response.text()).to.include(\"invalid status\");\r

      });\r

      \r

      // 7. Check accountId not found\r

      pm.test(\"Account not found\", function () {\r

      \    pm.response.to.have.status(400);\r

      \    pm.expect(pm.response.text()).to.include(\"Account not found\");\r

      });\r

      \r

      // 8. Check invalid accountId format\r

      pm.test(\"Invalid accountId format\", function () {\r

      \    pm.response.to.have.status(400);\r

      \    pm.expect(pm.response.text()).to.include(\"invalid accountId\");\r

      });\r

      \r

      // 9.Check error when change status\r

      pm.test(\"Change status is not successful\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r

      \r

      // 10. Sever error\r

      pm.test(\"Internal server error\", function () {\r

      \    pm.response.to.have.status(500);\r

      });\r\n"
    language: text/javascript
  - type: beforeRequest
    code: pm.environment.set("account_change_id", 1);
    language: text/javascript
order: 3000

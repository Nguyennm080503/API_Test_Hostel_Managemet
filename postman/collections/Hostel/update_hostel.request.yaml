$kind: http-request
description: >-
  ## Update Hostel


  Updates the information of an existing hostel belonging to the authenticated
  customer.


  ---


  ### Authentication


  Requires a **Bearer Token** in the `Authorization` header.


  ```

  Authorization: Bearer {{user_token}}

   ```

  ---


  ### Request Body


  **Content-Type:** `application/json`


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `hostelID` | integer | Yes | The unique ID of the hostel to update |

  | `hostelName` | string | Yes | The new name of the hostel |

  | `hostelAddress` | string | Yes | The new address of the hostel |


  **Example:**


  ``` json

  {
    "hostelID": 7,
    "hostelName": "269/18/6 Phan Huy Ích",
    "hostelAddress": "269/18/6 Phan Huy Ích Phường An Hội Tây"
  }

   ```

  ---


  ### Responses


  | Status Code | Description |

  | --- | --- |

  | `200 OK` | Hostel updated successfully |

  | `400 Bad Request` | Validation failed (e.g. missing hostel name or address)
  |

  | `401 Unauthorized` | No token provided |

  | `403 Forbidden` | User does not have permission to update this hostel |


  **Validation error examples:**


  - `"Vui lòng nhập tên nhà !"` — Hostel name is required
      
  - `"Vui lòng nhập địa chỉ nhà !"` — Hostel address is required
      
  - `"Nhà này đã tồn tại !"` — A hostel with this name already exists
      

  ---


  ### Post-response Tests


  The following automated tests are run after each response:


  1. **Update hostel successfully** — Asserts status `200`
      
  2. **Hostel name is existed** — Asserts response body equals `"Nhà này đã tồn
  tại !"`
      
  3. **Response time is less than 2000ms** — Asserts response time is below
  2000ms
      
  4. **User is forbidden** — Asserts status `403`
      
  5. **Unauthorized when no token** — Asserts status `401`
      
  6. **Update hostel fail** — Asserts status `400`
      
  7. **Check validate hostel name** — Asserts response body equals `"Vui lòng
  nhập tên nhà !"`
      
  8. **Check validate hostel address** — Asserts response body equals `"Vui lòng
  nhập địa chỉ nhà !"`
      
  9. **Verify hostel update** — Sends a GET request to
  `/api/hostels/customer/all` and verifies the updated hostel's name and address
  match the request body
      

  ---


  ### Environment Variables


  After a successful request, the following environment variables are set for
  use in downstream requests:


  | Variable | Value |

  | --- | --- |

  | `hostel_id` | The `hostelID` from the request body |

  | `hostel_name` | The `hostelName` from the request body |

  | `hostel_address` | The `hostelAddress` from the request body |
url: "{{base_url}}/api/hostels/customer/update/hostel"
method: PATCH
body:
  type: json
  content: "{\r

    \  \"hostelID\": 7,\r

    \  \"hostelName\": \"269/18/6 Phan Huy Ích\",\r

    \  \"hostelAddress\": \"269/18/6 Phan Huy Ích Phường An Hội Tây\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{user_token}}"
scripts:
  - type: afterResponse
    code: "let responseText = pm.response.text();\r

      \r

      let response = null;\r

      try {\r

      \    response = pm.response.json();\r

      } catch (e) {\r

      \    response = responseText;\r

      }\r

      \r

      // 1. Update hostel successfully\r

      pm.test(\"Update hostel successfully\", function () {\r

      \    pm.response.to.have.status(200);\r

      })\r

      \r

      // 2. Check hostel name existed \r

      pm.test(\"Hostel name is existed\", function () {\r

      \    pm.expect(response).to.eql(\"Nhà này đã tồn tại !\");\r

      })\r

      \r

      // 3. Response time < 2000ms\r

      pm.test(\"Response time is less than 2000ms\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(2000);\r

      });\r

      \r

      \r

      // 4. Check user is forbidden when not authorized.\r

      pm.test(\"User is forbidden\", function () {\r

      \    try{\r

      \        pm.response.to.have.status(403);\r

      \    }catch{\r

      \        throw new Error(\"User is not forbidden\");\r

      \    }\r

      });\r

      \r

      \r

      // 5. Check unautorized response when no token is provided.\r

      pm.test(\"Unauthorized when no token\", function () {\r

      \    try{\r

      \        pm.response.to.have.status(401);\r

      \    }catch{\r

      \        throw new Error(\"User has token\");\r

      \    }\r

      });\r

      \r

      // 6. Update hostel fail\r

      pm.test(\"Update hostel fail\", function () {\r

      \    pm.response.to.have.status(400);\r

      })\r

      \r

      // 7. Check validate hostel name\r

      pm.test(\"Check validate hostel name\", function () {\r

      \    pm.expect(response).to.eql(\"Vui lòng nhập tên nhà !\");\r

      })\r

      \r

      // 8. Check validate hostel address\r

      pm.test(\"Check validate hostel address\", function () {\r

      \    pm.expect(response).to.eql(\"Vui lòng nhập địa chỉ nhà !\");\r

      })\r

      \r

      // 9. Verify hostel update\r

      let requestBody = {};\r

      \r

      try {\r

      \    requestBody = JSON.parse(pm.request.body.raw);\r

      } catch (e) {\r

      \    console.log(\"Body parse error:\", e);\r

      }\r

      \r

      pm.environment.set(\"hostel_id\", requestBody.hostelID);\r

      pm.environment.set(\"hostel_name\", requestBody.hostelName);\r

      pm.environment.set(\"hostel_address\", requestBody.hostelAddress);\r

      \r

      pm.sendRequest({\r

      \    url: pm.globals.get(\"base_url\") + \"/api/hostels/customer/all\",\r

      \    method: \"GET\",\r

      \    header: {\r

      \        \"Authorization\": \"Bearer \" + pm.globals.get(\"user_token\")\r

      \    }\r

      }, function (err, res) {\r

      \r

      \    if (err) {\r

      \        console.log(err);\r

      \        return new Error(err.message);\r

      \    }\r

      \r

      \    let data = res.json();\r

      \r

      \r

      \    let found = data.find(h => h.hostelID ==
      pm.environment.get(\"hostel_id\"));\r

      \r

      \    pm.test(\"Verify updated hostel\", function () {\r

      \        pm.expect(found).to.not.be.undefined;\r

      \        pm.expect(found.hostelName).to.eql(pm.environment.get(\"hostel_n\
      ame\"));\r

      \        pm.expect(found.hostelAddress).to.eql(pm.environment.get(\"hoste\
      l_address\"));\r

      \    });\r

      \r

      });"
    language: text/javascript
order: 3000

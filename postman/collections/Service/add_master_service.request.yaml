$kind: http-request
description: >-
  ## Add Master Service


  Creates a new master service entry in the system.


  ---


  ### Authentication


  Requires a Bearer token passed via the `Authorization` header:


  ```

  Authorization: Bearer {{user_token}}

   ```

  ---


  ### Request Body


  Content-Type: `application/json`


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `serviceName` | string | Yes | The name of the service to create. |


  **Example:**


  ``` json

  {
    "serviceName": "string"
  }

   ```

  ---


  ### Responses


  | Status | Description |

  | --- | --- |

  | `200 OK` | Service created successfully. |

  | `200 OK` | Returns `"Dịch vụ đã tồn tại !"` if a service with the same name
  already exists. |


  ---


  ### Test Scripts


  The following automated tests are executed after the response is received:


  1. **Status code is 200** — Asserts that the response status code equals
  `200`.
      
  2. **Response time under 2000ms** — Asserts that the response time is below
  `2000ms`.
      
  3. **Service name already exists check** — Verifies whether the API returns
  the message `"Dịch vụ đã tồn tại !"` indicating a duplicate service name.
      
  4. **Verify service creation** — Sends a follow-up `GET` request to
  `{{base_url}}/api/services/all` and confirms that the newly created service is
  present in the returned list.
url: "{{base_url}}/api/services/add/service"
method: POST
body:
  type: json
  content: "{\r

    \  \"serviceName\": \"string\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{user_token}}"
scripts:
  - type: afterResponse
    code: "let jsonData = pm.response.json();\r

      \r

      // 1. Status code = 200\r

      pm.test(\"Return status code 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      // 2. Response time < 2000ms\r

      pm.test(\"Response time is less than 2000ms\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(2000);\r

      });\r

      \r

      // 3. Check service name existed \r

      pm.test(\"Service name is existed\", function () {\r

      \    pm.expect(response).to.eql(\"Dịch vụ đã tồn tại !\");\r

      })\r

      \r

      // 4. Verify service created\r

      let requestBody = {};\r

      \r

      try {\r

      \    let service_name = JSON.parse(pm.request.body.raw.serviceName);\r

      \    pm.environment.set(\"service_name\", service_name);\r

      } catch (e) {\r

      \    console.log(e);\r

      }\r

      \r

      pm.sendRequest({\r

      \    url: pm.globals.get(\"base_url\") + \"/api/services/all\",\r

      \    method: \"GET\",\r

      \    header: {\r

      \        \"Authorization\": \"Bearer \" + pm.globals.get(\"user_token\")\r

      \    }\r

      }, function (err, res) {\r

      \r

      \    if (err) {\r

      \        console.log(err);\r

      \        return new Error(err.message);\r

      \    }\r

      \r

      \    let data = res.json();\r

      \r

      \r

      \    let found = data.find(h => h.service_name ==
      pm.environment.get(\"service_name\"));\r

      \r

      \    pm.test(\"Verify created master service successfully\", function ()
      {\r

      \        pm.expect(found).to.not.be.undefined;\r

      \    });\r

      \r

      });\r

      \r

      // 5. Check user is forbidden when not authorized.\r

      pm.test(\"User is forbidden\", function () {\r

      \    try{\r

      \        pm.response.to.have.status(403);\r

      \    }catch{\r

      \        throw new Error(\"User is not forbidden\");\r

      \    }\r

      });\r

      \r

      \r

      // 6. Check unautorized response when no token is provided.\r

      pm.test(\"Unauthorized when no token\", function () {\r

      \    try{\r

      \        pm.response.to.have.status(401);\r

      \    }catch{\r

      \        throw new Error(\"User has token\");\r

      \    }\r

      });\r

      \r

      \r

      \r

      \r

      \r\n"
    language: text/javascript
order: 2000
